<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>梁變形分析系統</title>
    <!-- 引入 React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 用於瀏覽器內編譯 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- SVG Icons 替換原本的 lucide-react ---
        const ActivityIcon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
            </svg>
        );
        const PlusIcon = () => (
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        );
        const TrashIcon = () => (
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                <line x1="10" y1="11" x2="10" y2="17"></line>
                <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
        );

        // --- 核心分析演算法 (直接勁度法) ---
        function solveLinearSystem(A, b) {
            const n = b.length;
            let aug = A.map((row, i) => [...row, b[i]]);

            for (let i = 0; i < n; i++) {
                let maxRow = i;
                for (let j = i + 1; j < n; j++) {
                    if (Math.abs(aug[j][i]) > Math.abs(aug[maxRow][i])) {
                        maxRow = j;
                    }
                }
                if (Math.abs(aug[maxRow][i]) < 1e-12) return null;
                let temp = aug[i];
                aug[i] = aug[maxRow];
                aug[maxRow] = temp;

                for (let j = i + 1; j < n; j++) {
                    let factor = aug[j][i] / aug[i][i];
                    for (let k = i; k <= n; k++) {
                        aug[j][k] -= factor * aug[i][k];
                    }
                }
            }
            let x = new Array(n).fill(0);
            for (let i = n - 1; i >= 0; i--) {
                let sum = 0;
                for (let j = i + 1; j < n; j++) {
                    sum += aug[i][j] * x[j];
                }
                x[i] = (aug[i][n] - sum) / aug[i][i];
            }
            return x;
        }

        function analyzeBeam(L, E, I, supports, loadParams) {
            const Ne = 100; // 元素數量
            const dx = L / Ne;
            const nDof = (Ne + 1) * 2;

            let K = Array(nDof).fill(0).map(() => Array(nDof).fill(0));
            let F = Array(nDof).fill(0);

            const ke = (E * I) / Math.pow(dx, 3);
            const k_el = [
                [12 * ke, 6 * dx * ke, -12 * ke, 6 * dx * ke],
                [6 * dx * ke, 4 * dx * dx * ke, -6 * dx * ke, 2 * dx * dx * ke],
                [-12 * ke, -6 * dx * ke, 12 * ke, -6 * dx * ke],
                [6 * dx * ke, 2 * dx * dx * ke, -6 * dx * ke, 4 * dx * dx * ke]
            ];

            let { x1, q1, x2, q2 } = loadParams;
            if (x1 > x2) {
                [x1, x2] = [x2, x1];
                [q1, q2] = [q2, q1];
            }

            const q_eval = (x) => {
                if (x < x1 || x > x2) return 0;
                if (Math.abs(x2 - x1) < 1e-7) return q1; 
                return q1 + (q2 - q1) * (x - x1) / (x2 - x1);
            };

            for (let i = 0; i < Ne; i++) {
                const xa = i * dx;
                const xb = (i + 1) * dx;
                const dofs = [2 * i, 2 * i + 1, 2 * i + 2, 2 * i + 3];
                
                for (let r = 0; r < 4; r++) {
                    for (let c = 0; c < 4; c++) {
                        K[dofs[r]][dofs[c]] += k_el[r][c];
                    }
                }

                const qa = q_eval(xa);
                const qm = q_eval((xa + xb) / 2);
                const qb = q_eval(xb);

                const f1 = (dx / 6) * (1 * qa + 4 * 0.5 * qm + 0 * qb);
                const m1 = (dx / 6) * (0 * qa + 4 * 0.125 * dx * qm + 0 * qb);
                const f2 = (dx / 6) * (0 * qa + 4 * 0.5 * qm + 1 * qb);
                const m2 = (dx / 6) * (0 * qa + 4 * -0.125 * dx * qm + 0 * qb);

                F[2 * i] += f1;
                F[2 * i + 1] += m1;
                F[2 * i + 2] += f2;
                F[2 * i + 3] += m2;
            }

            let K_mod = K.map(row => [...row]);
            let F_mod = [...F];
            let K_orig = K.map(row => [...row]); 

            const validSupports = supports.filter(s => s >= 0 && s <= L);
            const supportNodes = [...new Set(validSupports.map(pos => Math.max(0, Math.min(Ne, Math.round(pos / dx)))))];

            supportNodes.forEach(node => {
                const dof = node * 2;
                for (let j = 0; j < nDof; j++) K_mod[dof][j] = 0;
                K_mod[dof][dof] = 1;
                F_mod[dof] = 0;
            });

            const U = solveLinearSystem(K_mod, F_mod);
            if (!U) return { error: "結構不穩定！請確保有足夠的支承（至少需兩個不重疊的支承）。" };

            let R = new Array(nDof).fill(0);
            for (let i = 0; i < nDof; i++) {
                let sum = 0;
                for (let j = 0; j < nDof; j++) sum += K_orig[i][j] * U[j];
                R[i] = sum - F[i]; 
            }

            const reactionResults = supportNodes.map(node => ({
                x: node * dx,
                force: R[node * 2]
            })).filter(r => Math.abs(r.force) > 1e-10); 

            const getV = (x) => {
                let v = 0;
                reactionResults.forEach(r => { if (r.x <= x + 1e-7) v += r.force; });
                if (x > x1) {
                    const end_x = Math.min(x, x2);
                    const L_int = end_x - x1;
                    const q_end = q1 + (q2 - q1) * L_int / (x2 - x1 || 1);
                    v += 0.5 * (q1 + q_end) * L_int;
                }
                return v;
            };

            const getM = (x) => {
                let m = 0;
                reactionResults.forEach(r => { if (r.x <= x + 1e-7) m += r.force * (x - r.x); });
                if (x > x1) {
                    const end_x = Math.min(x, x2);
                    const L_int = end_x - x1;
                    const q_end = q1 + (q2 - q1) * L_int / (x2 - x1 || 1);
                    const area = 0.5 * (q1 + q_end) * L_int;
                    const centroid_from_x1 = L_int > 0 ? (L_int / 3) * (q1 + 2 * q_end) / (q1 + q_end || 1) : 0;
                    m += area * (x - (x1 + centroid_from_x1));
                }
                return m;
            };

            const getDispAndRot = (x) => {
                if (x <= 0) return { v: U[0], theta: U[1] };
                if (x >= L) return { v: U[Ne * 2], theta: U[Ne * 2 + 1] };
                const idx = Math.floor(x / dx);
                const xi = (x - idx * dx) / dx;
                const v1 = U[idx * 2], t1 = U[idx * 2 + 1];
                const v2 = U[(idx + 1) * 2], t2 = U[(idx + 1) * 2 + 1];
                const N1 = 1 - 3*xi*xi + 2*xi*xi*xi, N2 = dx * (xi - 2*xi*xi + xi*xi*xi);
                const N3 = 3*xi*xi - 2*xi*xi*xi, N4 = dx * (xi*xi*xi - xi*xi);
                const dN1 = (-6*xi + 6*xi*xi)/dx, dN2 = (1 - 4*xi + 3*xi*xi);
                const dN3 = (6*xi - 6*xi*xi)/dx, dN4 = (3*xi*xi - 2*xi);
                return { v: N1*v1 + N2*t1 + N3*v2 + N4*t2, theta: dN1*v1 + dN2*t1 + dN3*v2 + dN4*t2 };
            };

            let keyPoints = [0, L, x1, x2, ...validSupports];
            let dataXSet = new Set();
            for (let i = 0; i <= Ne; i++) dataXSet.add(i * dx);
            keyPoints.forEach(kp => {
                if (kp >= 0 && kp <= L) {
                    dataXSet.add(Math.max(0, kp - 1e-5));
                    dataXSet.add(kp);
                    dataXSet.add(Math.min(L, kp + 1e-5));
                }
            });
            let sortedX = Array.from(dataXSet).sort((a, b) => a - b).filter(x => x >= 0 && x <= L);

            let plots = { shear: [], moment: [], rotation: [], deflection: [] };
            sortedX.forEach(x => {
                const { v, theta } = getDispAndRot(x);
                plots.shear.push({ x, y: getV(x) });
                plots.moment.push({ x, y: getM(x) });
                plots.rotation.push({ x, y: -theta }); // 加上負號符合習慣
                plots.deflection.push({ x, y: v });
            });

            return { reactionResults, plots };
        }

        // --- SVG 繪圖元件 ---
        const PlotGraph = ({ title, data, unit, fill = true }) => {
            if (!data || data.length === 0) return null;

            const width = 600;
            const height = 180;
            const padding = { top: 30, bottom: 20, left: 40, right: 40 };
            const innerWidth = width - padding.left - padding.right;
            const innerHeight = height - padding.top - padding.bottom;

            const minX = Math.min(...data.map(d => d.x));
            const maxX = Math.max(...data.map(d => d.x));
            let minY = Math.min(...data.map(d => d.y));
            let maxY = Math.max(...data.map(d => d.y));

            if (minY === maxY) {
                minY -= 1; maxY += 1;
            }

            const scaleX = x => padding.left + ((x - minX) / (maxX - minX)) * innerWidth;
            const scaleY = y => padding.top + innerHeight - ((y - minY) / (maxY - minY)) * innerHeight;
            const zeroY = scaleY(Math.max(minY, Math.min(maxY, 0))); 

            const pathData = data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${scaleX(d.x)} ${scaleY(d.y)}`).join(' ');
            const fillData = `${pathData} L ${scaleX(data[data.length-1].x)} ${zeroY} L ${scaleX(data[0].x)} ${zeroY} Z`;

            const maxPoint = data.reduce((p, c) => c.y > p.y ? c : p, data[0]);
            const minPoint = data.reduce((p, c) => c.y < p.y ? c : p, data[0]);

            return (
                <div className="mb-6 flex flex-col items-center w-full">
                    <h3 className="text-gray-700 font-bold mb-2 text-sm self-start pl-4">{title} {unit && <span className="text-gray-500 font-normal">({unit})</span>}</h3>
                    {/* 加入 overflow-x-auto 讓手機版圖表不會擠壓，可左右滑動 */}
                    <div className="w-full overflow-x-auto pb-2 px-2">
                        <div className="min-w-[450px]">
                            <svg width="100%" viewBox={`0 0 ${width} ${height}`} className="bg-white border rounded shadow-sm" preserveAspectRatio="xMidYMid meet">
                                <line x1={padding.left} y1={zeroY} x2={width - padding.right} y2={zeroY} stroke="#9ca3af" strokeWidth="1" />
                                {fill && <path d={fillData} fill="rgba(59, 130, 246, 0.15)" stroke="none" />}
                                <path d={pathData} fill="none" stroke="#2563eb" strokeWidth="2" strokeLinejoin="round" />
                                {Math.abs(maxY) > 1e-10 && (
                                    <text x={scaleX(maxPoint.x)} y={scaleY(maxPoint.y) - 8} fontSize="12" fill="#1e3a8a" textAnchor="middle" className="font-semibold">
                                        {maxPoint.y.toFixed(6)}
                                    </text>
                                )}
                                {Math.abs(minY) > 1e-10 && (
                                    <text x={scaleX(minPoint.x)} y={scaleY(minPoint.y) + 16} fontSize="12" fill="#991b1b" textAnchor="middle" className="font-semibold">
                                        {minPoint.y.toFixed(6)}
                                    </text>
                                )}
                            </svg>
                        </div>
                    </div>
                </div>
            );
        };

        const ModelPlot = ({ L, supports, reactions, loadParams }) => {
            const width = 600;
            const height = 150;
            const padding = { top: 50, bottom: 40, left: 40, right: 40 };
            const innerWidth = width - padding.left - padding.right;
            const beamY = height - padding.bottom;

            const scaleX = x => padding.left + (x / L) * innerWidth;

            return (
                <div className="mb-6 flex flex-col items-center w-full">
                    <h3 className="text-gray-700 font-bold mb-2 text-sm self-start pl-4">反力與模型圖 (Reactions)</h3>
                    <div className="w-full overflow-x-auto pb-2 px-2">
                        <div className="min-w-[450px]">
                            <svg width="100%" viewBox={`0 0 ${width} ${height}`} className="bg-white border rounded shadow-sm" preserveAspectRatio="xMidYMid meet">
                                <line x1={scaleX(0)} y1={beamY} x2={scaleX(L)} y2={beamY} stroke="#111827" strokeWidth="4" />
                                
                                {(() => {
                                    const { x1, q1, x2, q2 } = loadParams;
                                    if (q1 === 0 && q2 === 0) return null;
                                    const maxQ = Math.max(Math.abs(q1), Math.abs(q2));
                                    const loadScaleY = 40 / (maxQ || 1); 
                                    
                                    const p1x = scaleX(x1);
                                    const p1y = beamY + q1 * loadScaleY; 
                                    const p2x = scaleX(x2);
                                    const p2y = beamY + q2 * loadScaleY;

                                    return (
                                        <g>
                                            <polygon points={`${p1x},${beamY} ${p1x},${p1y} ${p2x},${p2y} ${p2x},${beamY}`} fill="rgba(239, 68, 68, 0.2)" stroke="#ef4444" strokeWidth="1" />
                                            {Array.from({ length: 6 }).map((_, i) => {
                                                const px = x1 + (x2 - x1) * (i / 5);
                                                const pq = q1 + (q2 - q1) * (i / 5);
                                                if (Math.abs(pq) < 1e-5) return null;
                                                const ax = scaleX(px);
                                                const ayStart = beamY + pq * loadScaleY;
                                                return (
                                                    <g key={i}>
                                                        <line x1={ax} y1={ayStart} x2={ax} y2={beamY - Math.sign(pq)*3} stroke="#ef4444" strokeWidth="1.5" />
                                                        <polygon points={`${ax-3},${beamY - Math.sign(pq)*8} ${ax+3},${beamY - Math.sign(pq)*8} ${ax},${beamY}`} fill="#ef4444" />
                                                    </g>
                                                );
                                            })}
                                        </g>
                                    );
                                })()}

                                {supports.map((pos, i) => (
                                    <polygon key={`sup-${i}`} points={`${scaleX(pos)},${beamY} ${scaleX(pos)-8},${beamY+12} ${scaleX(pos)+8},${beamY+12}`} fill="#4b5563" />
                                ))}

                                {reactions && reactions.map((r, i) => {
                                    const rx = scaleX(r.x);
                                    const isUp = r.force > 0;
                                    const lineEnd = isUp ? beamY + 15 : beamY - 15;
                                    const lineStart = isUp ? lineEnd + 25 : lineEnd - 25;
                                    
                                    return (
                                        <g key={`rx-${i}`}>
                                            <line x1={rx} y1={lineStart} x2={rx} y2={lineEnd} stroke="#059669" strokeWidth="2" />
                                            <polygon 
                                                points={`${rx-4},${lineEnd + (isUp?6:-6)} ${rx+4},${lineEnd + (isUp?6:-6)} ${rx},${lineEnd}`} 
                                                fill="#059669" 
                                            />
                                            <text x={rx} y={isUp ? lineStart + 15 : lineStart - 5} fontSize="12" fill="#059669" textAnchor="middle" className="font-bold">
                                                {r.force.toFixed(4)}
                                            </text>
                                            <text x={rx} y={beamY + 30} fontSize="10" fill="#6b7280" textAnchor="middle">
                                                X={r.x.toFixed(1)}
                                            </text>
                                        </g>
                                    );
                                })}
                            </svg>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 主應用程式 ---
        function App() {
            const [length, setLength] = useState(75);
            const [E, setE] = useState(50000);
            const [I, setI] = useState(0.281);
            const [supports, setSupports] = useState([12, 60]);
            
            const [loadType, setLoadType] = useState('triangular'); 
            const [loadParams, setLoadParams] = useState({ x1: 0, q1: -0.18, x2: 75, q2: 0 });

            const [results, setResults] = useState(null);
            const [error, setError] = useState('');

            const handleLoadTypeChange = (e) => {
                const type = e.target.value;
                setLoadType(type);
                if (type === 'uniform') {
                    setLoadParams({ x1: 0, q1: -0.18, x2: length, q2: -0.18 });
                } else if (type === 'triangular') {
                    setLoadParams({ x1: 0, q1: -0.18, x2: length, q2: 0 });
                } else if (type === 'trapezoidal') {
                    setLoadParams({ x1: 0, q1: -0.18, x2: length, q2: -0.09 });
                }
            };

            const handleAnalyze = () => {
                setError('');
                const res = analyzeBeam(parseFloat(length), parseFloat(E), parseFloat(I), supports.map(parseFloat), {
                    x1: parseFloat(loadParams.x1),
                    q1: parseFloat(loadParams.q1),
                    x2: parseFloat(loadParams.x2),
                    q2: parseFloat(loadParams.q2),
                });
                
                if (res.error) {
                    setError(res.error);
                    setResults(null);
                } else {
                    setResults(res);
                }
            };

            useEffect(() => { handleAnalyze(); }, []);

            return (
                <div className="min-h-screen bg-gray-50 text-gray-800 p-4 md:p-8 flex justify-center">
                    <div className="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-12 gap-8">
                        
                        {/* 左側：控制面板 */}
                        <div className="lg:col-span-4 bg-white p-5 sm:p-6 rounded-xl shadow-md border border-gray-100 flex flex-col gap-6 h-fit">
                            <div className="flex items-center gap-2 border-b pb-4">
                                <div className="text-blue-600"><ActivityIcon /></div>
                                <h2 className="text-xl font-bold text-gray-800">變形分析設定</h2>
                            </div>

                            {/* 響應式 Grid：手機單欄，大螢幕雙欄 */}
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-xs font-semibold text-gray-500 uppercase mb-1">梁總長 (L)</label>
                                    <input type="number" value={length} onChange={(e) => setLength(e.target.value)} className="w-full p-2.5 sm:p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none transition" />
                                </div>
                                <div>
                                    <label className="block text-xs font-semibold text-gray-500 uppercase mb-1">楊氏模數 (E)</label>
                                    <input type="number" value={E} onChange={(e) => setE(e.target.value)} className="w-full p-2.5 sm:p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none transition" />
                                </div>
                                <div className="col-span-1 sm:col-span-2">
                                    <label className="block text-xs font-semibold text-gray-500 uppercase mb-1">慣性矩 (I)</label>
                                    <input type="number" step="0.001" value={I} onChange={(e) => setI(e.target.value)} className="w-full p-2.5 sm:p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none transition" />
                                </div>
                            </div>

                            <div className="border-t pt-4">
                                <div className="flex justify-between items-center mb-2">
                                    <label className="text-xs font-semibold text-gray-500 uppercase">支承位置 (Supports)</label>
                                    <button onClick={() => setSupports([...supports, length / 2])} className="text-blue-600 hover:bg-blue-50 px-2 py-1.5 rounded transition flex items-center text-sm">
                                        <PlusIcon /> <span className="ml-1">新增</span>
                                    </button>
                                </div>
                                <div className="flex flex-col gap-3">
                                    {supports.map((sup, idx) => (
                                        <div key={idx} className="flex items-center gap-2">
                                            <span className="text-gray-400 text-sm font-semibold">X =</span>
                                            <input 
                                                type="number" 
                                                value={sup} 
                                                onChange={(e) => {
                                                    const newSups = [...supports];
                                                    newSups[idx] = e.target.value;
                                                    setSupports(newSups);
                                                }} 
                                                className="w-full p-2.5 sm:p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none" 
                                            />
                                            <button onClick={() => setSupports(supports.filter((_, i) => i !== idx))} className="text-red-500 hover:bg-red-50 p-2.5 sm:p-2 rounded">
                                                <TrashIcon />
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="border-t pt-4">
                                <label className="block text-xs font-semibold text-gray-500 uppercase mb-2">載重形式</label>
                                <select value={loadType} onChange={handleLoadTypeChange} className="w-full p-3 sm:p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none mb-4">
                                    <option value="triangular">三角形 (Triangular)</option>
                                    <option value="uniform">均布 (Uniform)</option>
                                    <option value="trapezoidal">梯形 (Trapezoidal)</option>
                                </select>

                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-xs text-gray-500 mb-1">起始點 X1</label>
                                        <input type="number" value={loadParams.x1} onChange={e => setLoadParams({...loadParams, x1: e.target.value})} className="w-full p-2.5 sm:p-2 border rounded text-sm" />
                                    </div>
                                    <div>
                                        <label className="block text-xs text-gray-500 mb-1">載重 Q1</label>
                                        <input type="number" step="0.01" value={loadParams.q1} onChange={e => setLoadParams({...loadParams, q1: e.target.value})} className="w-full p-2.5 sm:p-2 border rounded text-sm" />
                                    </div>
                                    <div>
                                        <label className="block text-xs text-gray-500 mb-1">結束點 X2</label>
                                        <input type="number" value={loadParams.x2} onChange={e => setLoadParams({...loadParams, x2: e.target.value})} className="w-full p-2.5 sm:p-2 border rounded text-sm" />
                                    </div>
                                    <div>
                                        <label className="block text-xs text-gray-500 mb-1">載重 Q2</label>
                                        <input type="number" step="0.01" value={loadParams.q2} onChange={e => setLoadParams({...loadParams, q2: e.target.value})} className="w-full p-2.5 sm:p-2 border rounded text-sm" />
                                    </div>
                                </div>
                            </div>

                            <button 
                                onClick={handleAnalyze} 
                                className="w-full py-3 sm:py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg shadow transition mt-2 text-lg sm:text-base"
                            >
                                執行分析
                            </button>

                            {error && (
                                <div className="p-3 bg-red-100 text-red-700 text-sm rounded border border-red-200">
                                    {error}
                                </div>
                            )}
                        </div>

                        {/* 右側：分析結果圖表 */}
                        <div className="lg:col-span-8 bg-gray-50 rounded-xl flex flex-col gap-2 overflow-hidden py-4 sm:py-0">
                            {results ? (
                                <>
                                    <ModelPlot L={parseFloat(length)} supports={supports.map(parseFloat)} reactions={results.reactionResults} loadParams={loadParams} />
                                    <PlotGraph title="剪力圖 (Shear)" data={results.plots.shear} unit="Consistent" />
                                    <PlotGraph title="彎矩圖 (Moment)" data={results.plots.moment} unit="Consistent" />
                                    <PlotGraph title="角度圖 (Rotation)" data={results.plots.rotation} unit="radians" fill={false} />
                                    <PlotGraph title="變形圖 (Deflection)" data={results.plots.deflection} unit="Consistent" />
                                </>
                            ) : (
                                <div className="flex-1 flex items-center justify-center text-gray-400 min-h-[300px] border-2 border-dashed border-gray-300 rounded-xl bg-white">
                                    請點擊左側「執行分析」以顯示結果
                                </div>
                            )}
                        </div>

                    </div>
                </div>
            );
        }

        // 將 App 渲染到畫面上
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
